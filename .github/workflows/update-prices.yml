name: Update Market Prices

on:
  schedule:
    # Every 30 minutes during market hours Mon-Fri (13:30-21:00 UTC = 9:30am-5pm ET)
    - cron: '0,30 13-20 * * 1-5'
    # Once on weekends to keep crypto fresh
    - cron: '0 14 * * 0,6'
  workflow_dispatch: # allow manual trigger

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests

      - name: Fetch prices
        run: python .github/scripts/fetch_prices.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices.json
          git diff --staged --quiet || git commit -m "chore: update market prices [skip ci]"
          git push
